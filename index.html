<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Levino Flash - AI Code Editor</title>
<style>
:root {
    --bg: #0b0d10;
    --panel: #14181e;
    --panel2: #1a1e24;
    --border: #2a323c;
    --text: #e8edf2;
    --text-dim: #6a7a8a;
    --text-faint: #3a4550;
    --code-bg: #0d1117;
    --accent: #c7b18f;
    --accent-soft: #e8d9bf;
    --danger: #ff4757;
    --mono: 'Consolas', 'Fira Code', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: var(--bg);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    height: 100vh; overflow: hidden;
    display: flex; flex-direction: column;
}
.header {
    padding: 12px 20px; background: var(--panel2); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.header h1 { color: var(--text); font-size: 18px; font-weight: 500; }
.header .status { color: var(--text-dim); font-size: 13px; }

.main { display: flex; flex: 1; overflow: hidden; }

.file-panel {
    width: 200px; background: var(--panel); border-right: 1px solid var(--border);
    padding: 12px; overflow-y: auto; flex-shrink: 0;
}
.panel-title {
    color: var(--text-dim); font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
}
.panel-title .title-actions { display: flex; gap: 10px; align-items: center; }
.panel-title .add-btn { cursor: pointer; color: var(--accent); font-size: 15px; line-height: 1; }
.panel-title .add-btn:hover { color: var(--accent-soft); }
.file-panel.drag-over { background: #1a2230; box-shadow: inset 0 0 0 2px rgba(199,177,143,0.4); }
.file-item {
    padding: 8px 10px; border-radius: 6px; color: #a0b0c0; font-size: 13px; cursor: pointer;
    transition: 0.15s; font-family: var(--mono); user-select: none;
    display: flex; justify-content: space-between; align-items: center; gap: 6px;
}
.file-item .fname { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-item .del-x { color: var(--text-faint); font-size: 12px; flex-shrink: 0; }
.file-item .del-x:hover { color: var(--danger); }
.file-item:hover { background: #1f2833; }
.file-item.active {
    background: #2b2519; color: var(--accent-soft);
    box-shadow: inset 0 0 0 1px rgba(199,177,143,0.35);
}
.file-item.active .del-x { color: var(--accent); }

.folder-item {
    padding: 7px 10px; border-radius: 6px; color: #8a9aaa; font-size: 13px; cursor: pointer;
    transition: 0.15s; font-family: var(--mono); user-select: none;
    display: flex; align-items: center; gap: 5px;
}
.folder-item:hover { background: #1f2833; }
.folder-item .folder-caret { font-size: 10px; width: 10px; flex-shrink: 0; transition: transform 0.15s; color: var(--text-faint); }
.folder-item.expanded .folder-caret { transform: rotate(90deg); }
.folder-item .folder-icon { flex-shrink: 0; opacity: 0.8; }
.folder-item .fname { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tree-children { overflow: hidden; }
.tree-children.collapsed { display: none; }

.code-panel { flex: 1; background: var(--code-bg); display: flex; flex-direction: column; min-width: 0; }
.code-header {
    padding: 8px 16px; background: #161b22; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
}
.code-header .file-name { color: var(--text); font-size: 13px; font-family: var(--mono); }
.code-header .save-hint { color: var(--text-faint); font-size: 11px; }

.code-body { flex: 1; position: relative; overflow: hidden; --gutter-w: 38px; }
.line-gutter {
    position: absolute; inset: 0; width: var(--gutter-w); padding: 16px 0; pointer-events: none;
    font-family: var(--mono); font-size: 14px; line-height: 1.8; white-space: pre;
    overflow: hidden; z-index: 1; text-align: right; color: var(--text-faint);
}
.line-gutter .ln-row { display: block; height: 1.8em; padding-right: 14px; user-select: none; }
.code-highlight-layer {
    position: absolute; inset: 0; padding: 16px 16px 16px var(--gutter-w); pointer-events: none;
    font-family: var(--mono); font-size: 14px; line-height: 1.8; white-space: pre;
    overflow: hidden; z-index: 2;
}
.code-highlight-layer .hl-row { display: block; height: 1.8em; border-radius: 0; }
.code-highlight-layer .hl-row.hl-read   { background: rgba(231, 195, 90, 0.16); }
.code-highlight-layer .hl-row.hl-add    { background: rgba(90, 210, 130, 0.16); }
.code-highlight-layer .hl-row.hl-remove { background: rgba(255, 90, 90, 0.16); }
.code-highlight-layer .hl-row.hl-cut    { background: rgba(255, 90, 90, 0.10); }

#codeEditor {
    position: relative; z-index: 3; width: 100%; height: 100%;
    background: transparent; color: var(--text); border: none; padding: 16px 16px 16px var(--gutter-w);
    font-family: var(--mono); font-size: 14px; line-height: 1.8; outline: none;
    resize: none; tab-size: 4; white-space: pre; overflow: auto;
}
#codeEditor:disabled { color: var(--text-faint); }
#codeEditor::placeholder { color: var(--text-faint); }

.chat-panel {
    width: 340px; background: var(--panel); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0;
}
.chat-header {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
}
.chat-header .title { color: var(--text); font-size: 14px; font-weight: 500; }
.chat-header .actions { display: flex; gap: 8px; align-items: center; }
.chat-header .model-badge {
    font-size: 11px; color: var(--text-dim); background: #1f2833; padding: 2px 10px; border-radius: 12px;
}
.chat-header .clear-btn {
    background: transparent; border: 1px solid #3a4550; color: var(--text-dim);
    padding: 2px 10px; border-radius: 12px; cursor: pointer; font-size: 11px; transition: 0.15s;
}
.chat-header .clear-btn:hover { border-color: var(--danger); color: var(--danger); }

.chat-messages { flex: 1; padding: 12px 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
.chat-msg {
    padding: 8px 12px; border-radius: 12px; font-size: 13px; line-height: 1.5;
    word-break: break-word; max-width: 95%; white-space: pre-wrap;
}
.chat-msg.user { align-self: flex-end; background: #2b6ef0; color: white; }
.chat-msg.ai { align-self: flex-start; background: #1f2833; color: #e4e9f0; }
.chat-msg.system { align-self: center; background: transparent; color: var(--text-faint); font-size: 12px; text-align: center; }

.action-list { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
.action-card {
    display: flex; align-items: flex-start; gap: 10px;
    background: linear-gradient(180deg, rgba(199,177,143,0.07), rgba(199,177,143,0.03));
    border: 1px solid rgba(199,177,143,0.22); border-radius: 10px; padding: 9px 12px; font-size: 12px;
    cursor: default; transition: 0.15s;
}
.action-card.is-clickable { cursor: pointer; }
.action-card.is-clickable:hover { border-color: rgba(199,177,143,0.5); }
.action-card.is-error {
    background: linear-gradient(180deg, rgba(255,90,90,0.08), rgba(255,90,90,0.03));
    border-color: rgba(255,90,90,0.3);
}
.action-icon {
    flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: rgba(199,177,143,0.16); color: var(--accent); font-size: 12px; line-height: 1; margin-top: 1px;
}
.action-card.is-error .action-icon { background: rgba(255,90,90,0.18); color: #ff8a8a; }
.action-body { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.action-title { color: var(--accent-soft); font-weight: 600; font-size: 12.5px; }
.action-card.is-error .action-title { color: #ffb0b0; }
.action-detail { color: #8a93a0; font-family: var(--mono); font-size: 11.5px; word-break: break-word; }
.action-card.is-error .action-detail { color: #d99a9a; }
.action-hint { color: #6f7a86; font-size: 10.5px; margin-top: 2px; }

.chat-input-area { padding: 10px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-shrink: 0; }
.chat-input-area input {
    flex: 1; padding: 8px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--code-bg); color: var(--text); font-size: 13px; outline: none;
}
.chat-input-area input:focus { border-color: var(--accent); }
.chat-input-area input::placeholder { color: #4a5a6a; }
.chat-input-area button {
    background: var(--accent); border: none; color: #14181e; padding: 6px 16px;
    border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.15s; min-width: 80px;
}
.chat-input-area button:hover:not(:disabled) { background: #d9c5a8; }
.chat-input-area button:disabled { opacity: 0.4; cursor: not-allowed; }

.empty-files, .empty-chat { color: var(--text-faint); text-align: center; font-size: 13px; padding: 30px 10px; }

.file-panel::-webkit-scrollbar, .chat-messages::-webkit-scrollbar, #codeEditor::-webkit-scrollbar { width: 4px; }
.file-panel::-webkit-scrollbar-track, .chat-messages::-webkit-scrollbar-track, #codeEditor::-webkit-scrollbar-track { background: transparent; }
.file-panel::-webkit-scrollbar-thumb, .chat-messages::-webkit-scrollbar-thumb, #codeEditor::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

@media (max-width: 768px) {
    .file-panel { width: 160px; }
    .chat-panel { width: 240px; }
}
@media (max-width: 600px) {
    .main { flex-direction: column; }
    .file-panel { width: 100%; height: 100px; border-right: none; border-bottom: 1px solid var(--border); }
    .chat-panel { width: 100%; height: 200px; border-left: none; border-top: 1px solid var(--border); }
    .code-panel { flex: 1; }
}
</style>
</head>
<body>

<div class="header">
    <h1>Levino Flash</h1>
    <span class="status">● AI Code Editor</span>
</div>

<div class="main">
    <div class="file-panel" id="filePanel">
        <div class="panel-title">
            <span>Files</span>
            <span class="title-actions">
                <span class="add-btn" id="importBtn" title="Import files or folders (or drag &amp; drop them here)">⇪</span>
                <span class="add-btn" id="addFileBtn" title="New file">+</span>
            </span>
        </div>
        <div id="fileList"><div class="empty-files">No files yet — drag files/folders here or click ⇪</div></div>
        <input type="file" id="importFileInput" multiple style="display:none" />
    </div>

    <div class="code-panel">
        <div class="code-header">
            <span class="file-name" id="currentFileName">No file selected</span>
            <span class="save-hint" id="saveHint"></span>
        </div>
        <div class="code-body">
            <div class="line-gutter" id="lineGutter"></div>
            <div class="code-highlight-layer" id="highlightLayer"></div>
            <textarea id="codeEditor" placeholder="Select a file to start editing..." spellcheck="false" disabled></textarea>
        </div>
    </div>

    <div class="chat-panel">
        <div class="chat-header">
            <span class="title">AI Assistant</span>
            <div class="actions">
                <span class="model-badge">GPT-OSS 120B</span>
                <button class="clear-btn" id="clearChatBtn">✕ Clear</button>
            </div>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="empty-chat">Ask me to create, edit, or delete files</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Type a message..." />
            <button id="chatSendBtn">Send</button>
        </div>
    </div>
</div>

<script>
(function () {
'use strict';

// Personal API key, hardcoded by request. If this file is ever shared or
// published, anyone viewing the page source can see it -- revoke/rotate it
// at cloud.cerebras.ai if that happens.
const API_KEY = 'csk-hp4npdrd94y6v4v8c494mnx4vd6wh9hcmn8tpjr8xwrp64d6';
const API_URL = 'https://api.cerebras.ai/v1/chat/completions';
const MODEL = 'gpt-oss-120b';
const COOLDOWN_SECONDS = 5;
const MAX_HISTORY_MESSAGES = 10;

let files = {};
let currentFile = null;
let chatHistory = [];
let isProcessing = false;
// Tracks, per filename, the file content as it was the last time the model
// actually read it (full-file reads only). Lets us detect "the model is
// re-reading something it already has and the file hasn't changed since" --
// in that case we skip the redundant API round-trip entirely.
let readCache = {};
// Which folder paths are currently expanded in the file tree. Root-level
// folders start expanded by default the first time they're seen.
let expandedFolders = new Set();
let isCooldown = false;

const $ = id => document.getElementById(id);
const fileListEl = $('fileList');
const codeEditor = $('codeEditor');
const highlightLayer = $('highlightLayer');
const lineGutter = $('lineGutter');
const currentFileName = $('currentFileName');
const saveHint = $('saveHint');
const chatMessages = $('chatMessages');
const chatInput = $('chatInput');
const chatSendBtn = $('chatSendBtn');
const clearChatBtn = $('clearChatBtn');
const addFileBtn = $('addFileBtn');
const filePanel = $('filePanel');
const importBtn = $('importBtn');
const importFileInput = $('importFileInput');

// ---------- persistence ----------
const storage = {
    load(key, fallback) {
        try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
        catch (e) { return fallback; }
    },
    save(key, value) {
        try { localStorage.setItem(key, JSON.stringify(value)); return true; }
        catch (e) { console.error('Storage save failed:', e); return false; }
    }
};
const saveFiles = () => storage.save('levino_files', files);
const saveChat = () => storage.save('levino_chat', chatHistory);

// ---------- filename helpers ----------
// Normalizes names the model might mangle (quotes, backticks, "./", case)
// so "file not found" stops happening for trivial formatting reasons.
function sanitizeFilename(raw) {
    if (!raw) return '';
    // Backslashes are treated as path separators too (Windows-style paste),
    // normalize them to forward slashes before splitting into segments.
    const normalized = String(raw).trim().replace(/\\/g, '/');
    const segments = normalized.split('/')
        .map(seg => seg.trim()
            .replace(/^[`*_'"]+|[`*_'"]+$/g, '')
            .replace(/[,.;:]+$/, '')
            .replace(/\.\.+/g, '.')
            .trim())
        .filter(seg => seg && seg !== '.' && seg !== '..');
    return segments.join('/');
}
function resolveFilename(raw) {
    const clean = sanitizeFilename(raw);
    if (!clean) return null;
    if (files.hasOwnProperty(clean)) return clean;
    const lower = clean.toLowerCase();
    return Object.keys(files).find(k => k.toLowerCase() === lower) || null;
}
function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = String(str);
    return d.innerHTML;
}

// ---------- file panel ----------
// Builds a nested tree from flat "a/b/c.lua" path keys.
// Returns { folders: Map<name, node>, files: [path,...] } at each level.
function buildFileTree() {
    const root = { folders: new Map(), files: [] };
    for (const path of Object.keys(files)) {
        const parts = path.split('/').filter(Boolean);
        let node = root;
        let prefix = '';
        for (let i = 0; i < parts.length - 1; i++) {
            prefix += (prefix ? '/' : '') + parts[i];
            if (!node.folders.has(parts[i])) {
                node.folders.set(parts[i], { folders: new Map(), files: [], fullPath: prefix });
            }
            node = node.folders.get(parts[i]);
        }
        node.files.push(path);
    }
    return root;
}

function renderFiles() {
    const keys = Object.keys(files);
    if (!keys.length) { fileListEl.innerHTML = '<div class="empty-files">No files yet</div>'; return; }

    fileListEl.innerHTML = '';
    const tree = buildFileTree();
    renderTreeLevel(tree, fileListEl, 0);
}

function renderTreeLevel(node, container, depth) {
    const folderNames = Array.from(node.folders.keys()).sort((a, b) => a.localeCompare(b));
    for (const folderName of folderNames) {
        const child = node.folders.get(folderName);
        const isExpanded = expandedFolders.has(child.fullPath);

        const folderEl = document.createElement('div');
        folderEl.className = 'folder-item' + (isExpanded ? ' expanded' : '');
        folderEl.style.paddingLeft = (10 + depth * 16) + 'px';

        const caret = document.createElement('span');
        caret.className = 'folder-caret';
        caret.textContent = '▸';

        const icon = document.createElement('span');
        icon.className = 'folder-icon';
        icon.textContent = isExpanded ? '📂' : '📁';

        const fname = document.createElement('span');
        fname.className = 'fname';
        fname.textContent = folderName;
        fname.title = child.fullPath;

        folderEl.append(caret, icon, fname);

        const childContainer = document.createElement('div');
        childContainer.className = 'tree-children' + (isExpanded ? '' : ' collapsed');

        folderEl.addEventListener('click', () => {
            if (expandedFolders.has(child.fullPath)) expandedFolders.delete(child.fullPath);
            else expandedFolders.add(child.fullPath);
            renderFiles();
        });

        container.appendChild(folderEl);
        container.appendChild(childContainer);
        if (isExpanded) renderTreeLevel(child, childContainer, depth + 1);
    }

    const fileNames = node.files.slice().sort((a, b) => a.localeCompare(b));
    for (const path of fileNames) {
        const baseName = path.split('/').pop();
        const item = document.createElement('div');
        item.className = 'file-item' + (path === currentFile ? ' active' : '');
        item.style.paddingLeft = (10 + depth * 16) + 'px';

        const fname = document.createElement('span');
        fname.className = 'fname';
        fname.textContent = baseName;
        fname.title = path;

        const delX = document.createElement('span');
        delX.className = 'del-x';
        delX.textContent = '✕';
        delX.title = 'Delete file';
        delX.addEventListener('click', e => {
            e.stopPropagation();
            if (confirm(`Delete file "${path}"?`)) deleteFile(path);
        });

        item.append(fname, delX);
        item.addEventListener('click', () => openFile(path));
        container.appendChild(item);
    }
}

function clearHighlight() { highlightLayer.innerHTML = ''; }

// Renders the 1..N line-number gutter for the currently loaded text.
function renderLineNumbers() {
    const lineCount = codeEditor.value.split('\n').length;
    let html = '';
    for (let i = 1; i <= lineCount; i++) html += `<span class="ln-row">${i}</span>`;
    lineGutter.innerHTML = html;
    lineGutter.scrollTop = codeEditor.scrollTop;
}

function openFile(name, highlight) {
    if (!files.hasOwnProperty(name)) return;
    currentFile = name;
    codeEditor.value = files[name] || '';
    codeEditor.disabled = false;
    currentFileName.textContent = name;
    saveHint.textContent = '';
    renderFiles();
    renderLineNumbers();
    if (highlight) applyHighlight(highlight.kind, highlight.start, highlight.end);
    else clearHighlight();
}

// Paints translucent rows behind the textarea for the given 1-indexed
// line range. kind is 'read' | 'add' | 'remove'.
function applyHighlight(kind, start, end) {
    const lineCount = codeEditor.value.split('\n').length;
    let html = '';
    for (let i = 1; i <= lineCount; i++) {
        const active = i >= start && i <= end;
        html += `<span class="hl-row${active ? ' hl-' + kind : ''}"> </span>`;
    }
    highlightLayer.innerHTML = html;

    // Scroll the textarea so the highlighted range is actually visible.
    const lineHeight = parseFloat(getComputedStyle(codeEditor).lineHeight) || 25;
    const targetTop = Math.max(0, (start - 1) * lineHeight - codeEditor.clientHeight / 3);
    codeEditor.scrollTop = targetTop;
    highlightLayer.scrollTop = codeEditor.scrollTop;
    highlightLayer.scrollLeft = codeEditor.scrollLeft;
    lineGutter.scrollTop = codeEditor.scrollTop;
}
codeEditor.addEventListener('scroll', () => {
    highlightLayer.scrollTop = codeEditor.scrollTop;
    highlightLayer.scrollLeft = codeEditor.scrollLeft;
    lineGutter.scrollTop = codeEditor.scrollTop;
});

// ---------- file operations (single dispatch table, used by both the
// model's JSON actions and the manual "+" button) ----------
function createFile(name, content) {
    const clean = sanitizeFilename(name);
    if (!clean) return { ok: false, error: 'Empty filename' };
    if (resolveFilename(clean)) return { ok: false, error: `File "${clean}" already exists` };
    files[clean] = content || '';
    saveFiles(); renderFiles();
    if (!currentFile) openFile(clean);
    return { ok: true, name: clean };
}

// Used by computer import: writes (creating or overwriting) a file at an
// exact path without the "already exists" guard, and without touching
// rendering/save -- the caller batches many of these then renders once.
function importFileRaw(path, content) {
    const clean = sanitizeFilename(path);
    if (!clean) return null;
    files[clean] = content;
    delete readCache[clean];
    return clean;
}

function deleteFile(rawName) {
    const real = resolveFilename(rawName);
    if (!real) return { ok: false, error: `File "${rawName}" not found` };
    delete files[real];
    delete readCache[real];
    saveFiles();
    if (currentFile === real) {
        currentFile = null;
        codeEditor.value = ''; codeEditor.disabled = true;
        currentFileName.textContent = 'No file selected';
        clearHighlight();
        lineGutter.innerHTML = '';
    }
    renderFiles();
    return { ok: true, name: real };
}

function writeFile(rawName, content) {
    const real = resolveFilename(rawName);
    if (!real) return { ok: false, error: `File "${rawName}" not found` };
    files[real] = content;
    saveFiles();
    delete readCache[real];
    if (currentFile === real) { codeEditor.value = content; renderLineNumbers(); }
    return { ok: true, name: real };
}

function readFile(rawName, startLine, endLine) {
    const real = resolveFilename(rawName);
    if (!real) return { ok: false, error: `File "${rawName}" not found` };
    const lines = files[real].split('\n');
    const isFullRead = startLine == null || startLine === '';
    let start = 1, end = lines.length;
    if (!isFullRead) {
        start = Math.max(1, parseInt(startLine, 10));
        end = endLine ? Math.max(start, parseInt(endLine, 10)) : start;
        if (Number.isNaN(start) || Number.isNaN(end)) return { ok: false, error: 'Invalid line range' };
        end = Math.min(end, lines.length);
    }
    if (start > lines.length) return { ok: false, error: `Line ${start} is out of range for "${real}" (it only has ${lines.length} lines)` };
    const slice = lines.slice(start - 1, end);
    const numbered = slice.map((l, i) => `${start + i}: ${l}`).join('\n');
    if (isFullRead) readCache[real] = { raw: files[real], numbered };
    return { ok: true, name: real, content: numbered, totalLines: lines.length, start, end };
}

function editLines(rawName, startLine, endLine, newContent) {
    const real = resolveFilename(rawName);
    if (!real) return { ok: false, error: `File "${rawName}" not found` };
    const lines = files[real].split('\n');
    const start = Math.max(1, parseInt(startLine, 10));
    const end = endLine ? Math.max(start, parseInt(endLine, 10)) : start;
    if (Number.isNaN(start)) return { ok: false, error: 'Invalid line number' };
    if (start > lines.length + 1) return { ok: false, error: `Line ${start} is out of range for "${real}" (it only has ${lines.length} lines)` };

    const oldSlice = lines.slice(start - 1, Math.min(end, lines.length)).join('\n');
    const replacement = (newContent == null) ? [] : String(newContent).split('\n');
    const deleteCount = Math.min(end, lines.length) - start + 1;
    lines.splice(start - 1, Math.max(0, deleteCount), ...replacement);
    files[real] = lines.join('\n');
    saveFiles();
    delete readCache[real];
    if (currentFile === real) { codeEditor.value = files[real]; renderLineNumbers(); }
    return { ok: true, name: real, start, end: start + replacement.length - 1, oldContent: oldSlice, newContent: replacement.join('\n') };
}

function deleteLines(rawName, startLine, endLine) {
    const real = resolveFilename(rawName);
    if (!real) return { ok: false, error: `File "${rawName}" not found` };
    const lines = files[real].split('\n');
    const start = parseInt(startLine, 10);
    const end = endLine ? parseInt(endLine, 10) : start;
    if (Number.isNaN(start) || start < 1 || end < start || end > lines.length) {
        return { ok: false, error: `Line range is out of range for "${real}" (it only has ${lines.length} lines)` };
    }
    const removed = lines.slice(start - 1, end).join('\n');
    lines.splice(start - 1, end - start + 1);
    files[real] = lines.join('\n');
    saveFiles();
    delete readCache[real];
    if (currentFile === real) { codeEditor.value = files[real]; renderLineNumbers(); }
    return { ok: true, name: real, removedContent: removed };
}

// ---------- manual editing ----------
codeEditor.addEventListener('input', () => {
    if (!currentFile) return;
    files[currentFile] = codeEditor.value;
    clearHighlight();
    renderLineNumbers();
    saveHint.textContent = 'Saving…';
    clearTimeout(codeEditor._t);
    codeEditor._t = setTimeout(() => {
        saveFiles();
        saveHint.textContent = 'Saved';
        setTimeout(() => { saveHint.textContent = ''; }, 1200);
    }, 400);
});

addFileBtn.addEventListener('click', () => {
    const name = prompt('New file name:');
    if (name === null) return;
    const r = createFile(name, '');
    if (!r.ok) alert(r.error); else openFile(r.name);
});

// ---------- import from computer ----------
// One button = plain multi-file picker (browsers don't allow a single
// native dialog to pick both loose files AND folders at once -- that's an
// OS-level limitation, not something we can work around with one input).
// Drag & drop covers the "any combination, folders included" case: dropping
// a mix of loose files and whole folders onto the panel imports all of it,
// folders and all, in one go.
importBtn.addEventListener('click', () => {
    importFileInput.value = '';
    importFileInput.click();
});

// Extensions we won't try to load as text -- importing these would just
// dump garbage/binary content into the editor.
const BINARY_EXT = /\.(png|jpe?g|gif|webp|bmp|ico|svg|mp3|mp4|wav|ogg|webm|mov|avi|zip|rar|7z|gz|tar|pdf|exe|dll|so|class|jar|woff2?|ttf|eot|otf)$/i;

function readAsText(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error);
        reader.readAsText(file);
    });
}

// Recursively walks a dropped FileSystemEntry (file or directory) and
// resolves to a flat list of { path, file } pairs with full relative paths.
function walkEntry(entry, prefix) {
    return new Promise(resolve => {
        if (entry.isFile) {
            entry.file(file => resolve([{ path: prefix + entry.name, file }]), () => resolve([]));
        } else if (entry.isDirectory) {
            const reader = entry.createReader();
            const all = [];
            const readBatch = () => {
                reader.readEntries(async entries => {
                    if (!entries.length) {
                        resolve(all);
                        return;
                    }
                    for (const child of entries) {
                        const results = await walkEntry(child, prefix + entry.name + '/');
                        all.push(...results);
                    }
                    readBatch(); // readEntries must be called repeatedly until empty
                }, () => resolve(all));
            };
            readBatch();
        } else {
            resolve([]);
        }
    });
}

async function importEntries(pathFilePairs) {
    if (!pathFilePairs.length) return;

    const skipped = [];
    const imported = [];
    let lastPath = null;

    for (const { path, file } of pathFilePairs) {
        if (BINARY_EXT.test(path)) { skipped.push(path); continue; }
        try {
            const text = await readAsText(file);
            const clean = importFileRaw(path, text);
            if (clean) { imported.push(clean); lastPath = clean; }
        } catch (e) {
            skipped.push(path);
        }
    }

    if (imported.length) {
        saveFiles();
        // Auto-expand the folders the new files landed in so the import is
        // immediately visible instead of looking like nothing happened.
        imported.forEach(p => {
            const parts = p.split('/');
            let prefix = '';
            for (let i = 0; i < parts.length - 1; i++) {
                prefix += (prefix ? '/' : '') + parts[i];
                expandedFolders.add(prefix);
            }
        });
        renderFiles();
        if (lastPath) openFile(lastPath);
    }

    if (skipped.length) {
        addSystemMessage(`Skipped ${skipped.length} file(s) that look binary (images, archives, etc.) -- this editor only handles text/code: ${skipped.slice(0, 5).join(', ')}${skipped.length > 5 ? '…' : ''}`);
    }
}

// Plain picker: no relative paths available, files land at tree root.
importFileInput.addEventListener('change', () => {
    const pairs = Array.from(importFileInput.files).map(f => ({ path: f.name, file: f }));
    importEntries(pairs);
});

// Drag & drop: works for loose files and whole folders, any mix, in one drop.
['dragenter', 'dragover'].forEach(evt => {
    filePanel.addEventListener(evt, e => {
        e.preventDefault();
        filePanel.classList.add('drag-over');
    });
});
['dragleave', 'drop'].forEach(evt => {
    filePanel.addEventListener(evt, e => {
        if (evt === 'dragleave' && e.target !== filePanel) return;
        filePanel.classList.remove('drag-over');
    });
});
filePanel.addEventListener('drop', async e => {
    e.preventDefault();
    const items = e.dataTransfer?.items;
    if (!items || !items.length) return;

    const entries = Array.from(items)
        .map(item => item.webkitGetAsEntry?.())
        .filter(Boolean);

    if (!entries.length) {
        // Fallback for browsers without webkitGetAsEntry: treat as loose files.
        const pairs = Array.from(e.dataTransfer.files).map(f => ({ path: f.name, file: f }));
        await importEntries(pairs);
        return;
    }

    const all = [];
    for (const entry of entries) {
        const results = await walkEntry(entry, '');
        all.push(...results);
    }
    await importEntries(all);
});

// ---------- chat rendering ----------
const ACTION_META = {
    createfile:  { label: 'File created',    icon: '+', hl: 'add' },
    deletefile:  { label: 'File deleted',    icon: '✕', hl: null },
    writefile:   { label: 'File rewritten',  icon: '✎', hl: 'add' },
    editlines:   { label: 'Lines edited',    icon: '✎', hl: 'add' },
    deletelines: { label: 'Lines deleted',   icon: '✕', hl: 'remove' },
    readfile:    { label: 'File read',       icon: '◎', hl: 'read' },
    error:       { label: 'Error',           icon: '!', hl: null },
    unknown:     { label: 'Action',          icon: '•', hl: null }
};

function buildActionCardHtml(action, idx) {
    const meta = ACTION_META[action.type] || ACTION_META.unknown;
    const isError = !action.ok;
    const title = isError ? ACTION_META.error.label : meta.label;
    const icon = isError ? ACTION_META.error.icon : meta.icon;
    const detail = isError ? (action.error || 'Unknown error') : (action.detail || '');
    const clickable = !isError && meta.hl && action.filename;
    const hintText = action.type === 'deletelines' ? 'Click to view where this was' : 'Click to view in code';
    const hint = clickable ? `<span class="action-hint">${hintText}</span>` : '';

    return `
        <div class="action-card${isError ? ' is-error' : ''}${clickable ? ' is-clickable' : ''}" data-action-idx="${idx}">
            <span class="action-icon">${escapeHtml(icon)}</span>
            <span class="action-body">
                <span class="action-title">${escapeHtml(title)}</span>
                <span class="action-detail">${escapeHtml(detail)}</span>
                ${hint}
            </span>
        </div>
    `;
}

function renderChatMessageEl(msg) {
    const div = document.createElement('div');
    div.className = `chat-msg ${msg.role}`;

    if (msg.role === 'ai' && msg.actions?.length) {
        const list = document.createElement('div');
        list.className = 'action-list';
        list.innerHTML = msg.actions.map((a, i) => buildActionCardHtml(a, i)).join('');
        list.querySelectorAll('.action-card.is-clickable').forEach(card => {
            card.addEventListener('click', () => {
                const action = msg.actions[+card.dataset.actionIdx];
                const meta = ACTION_META[action.type];
                if (!meta?.hl || !action.filename) return;
                if (currentFile !== action.filename) openFile(action.filename);
                if (action.type === 'deletelines') {
                    // The deleted lines no longer exist in the (now shorter)
                    // file, so highlighting that old range would land on
                    // unrelated, currently-different lines. Instead mark the
                    // cut point: the line now sitting where the deletion
                    // happened, with a thin top border instead of a fill.
                    const lineCount = codeEditor.value.split('\n').length;
                    const cutLine = Math.min(Math.max(1, action.start || 1), lineCount);
                    applyHighlight('cut', cutLine, cutLine);
                } else {
                    applyHighlight(meta.hl, action.start || 1, action.end || action.start || 1);
                }
            });
        });
        div.appendChild(list);

        const replyEl = document.createElement('div');
        replyEl.style.marginTop = '8px';
        replyEl.textContent = msg.content || 'Done';
        div.appendChild(replyEl);
    } else {
        div.textContent = msg.content; // never innerHTML for raw model text
    }
    return div;
}

function addChatMessage(role, content, actions) {
    chatMessages.querySelector('.empty-chat')?.remove();
    const msg = { role, content, actions: actions || null };
    chatMessages.appendChild(renderChatMessageEl(msg));
    chatMessages.scrollTop = chatMessages.scrollHeight;
    chatHistory.push(msg);
    saveChat();
    return msg;
}

function addSystemMessage(text) {
    chatMessages.querySelector('.empty-chat')?.remove();
    const div = document.createElement('div');
    div.className = 'chat-msg system';
    div.textContent = text;
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

function renderChatHistory() {
    chatMessages.innerHTML = '';
    const visible = chatHistory.filter(m => !m.hidden);
    if (!visible.length) { chatMessages.innerHTML = '<div class="empty-chat">Ask me to create, edit, or delete files</div>'; return; }
    visible.forEach(m => chatMessages.appendChild(renderChatMessageEl(m)));
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

function clearChat() { chatHistory = []; saveChat(); renderChatHistory(); }

function startCooldown() {
    isCooldown = true;
    chatSendBtn.disabled = true;
    let s = COOLDOWN_SECONDS;
    chatSendBtn.textContent = `${s}s`;
    const t = setInterval(() => {
        s--;
        if (s > 0) { chatSendBtn.textContent = `${s}s`; }
        else { clearInterval(t); isCooldown = false; chatSendBtn.disabled = false; chatSendBtn.textContent = 'Send'; }
    }, 1000);
}

function shortenForCard(text, maxLines, maxCharsPerLine) {
    if (!text) return '';
    const lines = text.split('\n').slice(0, maxLines).map(l =>
        l.length > maxCharsPerLine ? l.slice(0, maxCharsPerLine) + '…' : l
    );
    const truncatedLines = text.split('\n').length > maxLines;
    return lines.join('\n') + (truncatedLines ? '\n…' : '');
}

// ---------- action execution ----------
// One action object maps to one of these handlers. Each returns the public
// shape stored on the chat message (used both for the card UI and for
// click-to-highlight).
const HANDLERS = {
    createfile: a => {
        const r = createFile(a.filename, a.content || '');
        return { ok: r.ok, detail: r.ok ? `"${r.name}"` : null, error: r.error,
                 filename: r.ok ? r.name : null, start: 1, end: (a.content || '').split('\n').length };
    },
    deletefile: a => {
        const r = deleteFile(a.filename);
        return { ok: r.ok, detail: r.ok ? `"${r.name}"` : null, error: r.error };
    },
    writefile: a => {
        const r = writeFile(a.filename, a.content || '');
        return { ok: r.ok, detail: r.ok ? `"${r.name}"` : null, error: r.error,
                 filename: r.ok ? r.name : null, start: 1, end: (a.content || '').split('\n').length };
    },
    editlines: a => {
        const r = editLines(a.filename, a.start_line, a.end_line, a.content);
        const range = a.end_line ? `${a.start_line}-${a.end_line}` : `${a.start_line}`;
        return { ok: r.ok, detail: r.ok ? `"${r.name}" line(s) ${range}` : null, error: r.error,
                 filename: r.ok ? r.name : null, start: r.ok ? r.start : null, end: r.ok ? r.end : null,
                 oldContent: r.ok ? shortenForCard(r.oldContent, 6, 60) : null,
                 newContent: r.ok ? shortenForCard(r.newContent, 6, 60) : null };
    },
    deletelines: a => {
        const r = deleteLines(a.filename, a.start_line, a.end_line);
        const range = a.end_line ? `${a.start_line}-${a.end_line}` : `${a.start_line}`;
        return { ok: r.ok, detail: r.ok ? `"${r.name}" line(s) ${range}` : null, error: r.error,
                 filename: r.ok ? r.name : null, start: a.start_line, end: a.end_line || a.start_line,
                 removedContent: r.ok ? shortenForCard(r.removedContent, 6, 60) : null };
    },
    readfile: a => {
        const r = readFile(a.filename, a.start_line, a.end_line);
        return { ok: r.ok, detail: r.ok ? `"${r.name}" line(s) ${r.start}-${r.end} of ${r.totalLines}` : null, error: r.error,
                 filename: r.ok ? r.name : null, start: r.ok ? r.start : null, end: r.ok ? r.end : null,
                 readContent: r.ok ? r.content : null };
    }
};

function executeActions(actionList) {
    return actionList.map(raw => {
        const type = String(raw.type || '').toLowerCase();
        const handler = HANDLERS[type];
        if (!handler) return { type, ok: false, error: `Unknown action type "${raw.type}"` };
        return { type, ...handler(raw) };
    });
}

// ---------- model call ----------
function buildSystemPrompt() {
    const fileListStr = Object.keys(files).map(name => {
        const lineCount = files[name].split('\n').length;
        return `${name} (${lineCount} lines)`;
    }).join(', ') || 'none';

    const knownFiles = Object.keys(readCache).filter(name => files[name] === readCache[name].raw);
    const knownBlock = knownFiles.length
        ? '\n\nFILES YOU HAVE ALREADY READ (content below is current -- do NOT call readfile on these again, just use this directly):\n' +
          knownFiles.map(name => `--- ${name} ---\n${readCache[name].numbered}`).join('\n\n')
        : '';

    return `You are Levino Flash, an AI coding assistant inside a code editor.

Reply with ONE JSON object, nothing else (no markdown fences, no extra text):
{"reply": "short message in the user's language", "actions": [...]}

Actions you can use:
{"type": "createfile", "filename": "name.ext", "content": "..."}
{"type": "deletefile", "filename": "name.ext"}
{"type": "writefile", "filename": "name.ext", "content": "full new content"}
{"type": "editlines", "filename": "name.ext", "start_line": N, "end_line": N, "content": "replacement text"}
{"type": "deletelines", "filename": "name.ext", "start_line": N, "end_line": N}
{"type": "readfile", "filename": "name.ext", "start_line": N, "end_line": N}

Files: ${fileListStr}
Open file: ${currentFile || 'none'}${knownBlock}

Rules:
- "filename" is the full path including folders, e.g. "src/utils/helpers.lua" -- use exact paths from the list above, no quotes or markdown around them.
- readfile: omit start_line/end_line to read the whole file. Don't guess a small range like 1-20 hoping to find something -- if you don't know which lines you need, read the whole file.
- Don't re-read a file listed above under "already read" -- you already have its current content.
- If the user's request involves both viewing AND changing a file (fix/remove/add/replace/etc.), put readfile and the edit action(s) in the SAME response's actions array, in that order. Never split into "first I'll read" and a separate follow-up -- do both at once.
- If the user only asks to view/show/explain, use just readfile.
- editlines/deletelines need line numbers within the file's actual line count -- never guess past it.
- Prefer editlines/deletelines for targeted changes; use writefile only for short files or full rewrites the user explicitly asked for.
- Don't invent filenames that don't exist unless creating a new file.
- There's no "delete all" action -- to delete every file, add one deletefile per file.
- "reply" is always in the user's language, short and natural.`;
}

async function callModel(userMessage) {
    const history = chatHistory.slice(-MAX_HISTORY_MESSAGES).map(m => ({
        role: m.role === 'user' ? 'user' : 'assistant', content: m.content
    }));
    const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
        body: JSON.stringify({
            model: MODEL, max_completion_tokens: 2048, temperature: 0.3, top_p: 1,
            stream: false, response_format: { type: 'json_object' },
            messages: [{ role: 'system', content: buildSystemPrompt() }, ...history, { role: 'user', content: userMessage }]
        })
    });
    if (!response.ok) {
        const errText = await response.text();
        throw new Error(`API error ${response.status}: ${errText.slice(0, 300)}`);
    }
    const data = await response.json();
    const text = data.choices?.[0]?.message?.content;
    if (!text) throw new Error('Empty response from model');
    return text;
}

function parseModelJson(text) {
    let cleaned = text.trim().replace(/^```json\s*/i, '').replace(/^```\s*/, '').replace(/```\s*$/, '');
    let parsed;
    try { parsed = JSON.parse(cleaned); }
    catch (e) { throw new Error('Model did not return valid JSON'); }
    if (typeof parsed.reply !== 'string') parsed.reply = 'Done';
    if (!Array.isArray(parsed.actions)) parsed.actions = [];
    return parsed;
}

function friendlyFetchError(error) {
    if (!/failed to fetch/i.test(error.message)) return error.message;
    return location.protocol === 'file:'
        ? 'The browser is blocking this request because the page was opened as a file (file://). ' +
          'Serve it through a local server instead, e.g. run "python3 -m http.server 8000" in the ' +
          'folder with this file, then open http://localhost:8000/ instead of double-clicking the file.'
        : 'Could not reach api.cerebras.ai. Check your internet connection, disable any ad blockers/VPN ' +
          'for this page, and try again.';
}

const MAX_AUTO_RETRIES = 2; // safety cap so a persistently wrong model can't loop forever

async function sendToAI(userMessage) {
    const trimmed = userMessage.trim();
    if (!trimmed || isProcessing || isCooldown) return;

    addChatMessage('user', trimmed);
    chatInput.value = '';
    isProcessing = true;
    chatSendBtn.disabled = true;
    chatSendBtn.textContent = '...';

    try {
        await runTurn(trimmed, 0);
    } catch (error) {
        console.error(error);
        const message = friendlyFetchError(error);
        addChatMessage('ai', `Error: ${message}`, [{ type: 'error', ok: false, error: message }]);
    }

    isProcessing = false;
    startCooldown();
    chatInput.focus();
}

// Runs one model exchange and, if a line-range action failed because the
// model guessed a line number outside the file, automatically retries with
// the real line count -- so a bad guess self-corrects instead of leaving
// the user with a dead-end error message.
async function runTurn(message, depth, originalRequest) {
    // originalRequest is the user's actual ask, kept stable across an
    // auto-continued chain (read -> edit) so the follow-up prompt still
    // carries the real intent instead of a generic "continue" message.
    const userAsk = originalRequest || message;
    const rawText = await callModel(message);
    const parsed = parseModelJson(rawText);
    const results = parsed.actions.length ? executeActions(parsed.actions) : null;
    addChatMessage('ai', parsed.reply, results);

    if (!results) return;

    // If this turn was read-only, decide whether the model still owes the
    // user an edit. A readfile is "final" only when the user's original
    // message was itself just a request to view/explain something; any
    // other request (fix/change/delete/add/etc.) means the read was meant
    // to be a stepping stone, and the model failing to also act on it in
    // the same turn is the model dropping the ball -- so we continue the
    // turn automatically with the file content now available, instead of
    // leaving the user with a dead-end "I'll read it" message.
    const readOnly = results.every(r => r.type === 'readfile');
    if (readOnly) {
        // File content is now injected straight into the system prompt via
        // readCache on the next call, so we don't need to dump it into chat
        // history by hand -- that just duplicated context and made the
        // model more likely to "re-read" things it already had.
        const editIntentPattern = /(удали|убери|измени|исправь|поменяй|добавь|перепиши|сделай|замени|почини|fix|change|edit|delete|remove|replace|update|add|rewrite|modify)/i;
        const looksViewOnly = !editIntentPattern.test(userAsk);

        if (!looksViewOnly && depth < MAX_AUTO_RETRIES) {
            await runTurn(`Продолжи и выполни исходную просьбу: "${userAsk}". Содержимое файла уже доступно тебе выше -- не вызывай readfile снова, сразу добавь editlines/deletelines/writefile.`, depth + 1, userAsk);
        }
        return;
    }

    const rangeErrors = results.filter(r => !r.ok && /out of range/i.test(r.error || ''));
    if (rangeErrors.length && depth < MAX_AUTO_RETRIES) {
        const correction = rangeErrors.map(r => r.error).join(' ');
        chatHistory.push({ role: 'user', content: `${correction} Please re-check the real line count and try again with a valid range.`, hidden: true });
        saveChat();
        await runTurn('Retry with the correct line range.', depth + 1, userAsk);
    }
}

chatSendBtn.addEventListener('click', () => sendToAI(chatInput.value));
chatInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendToAI(chatInput.value); }
});
clearChatBtn.addEventListener('click', () => { if (confirm('Clear chat history?')) clearChat(); });

// ---------- init ----------
files = storage.load('levino_files', null) || { 'main.py': 'print("Hello, World!")' };
saveFiles();
chatHistory = storage.load('levino_chat', []);
renderFiles();
renderChatHistory();

const firstKey = Object.keys(files)[0];
if (firstKey) openFile(firstKey);

if (location.protocol === 'file:') {
    addSystemMessage('This page is open as a local file (file://) — API requests may be blocked by the browser. ' +
        'If the assistant replies with a "Failed to fetch" error, serve this page through a local server ' +
        '("python3 -m http.server" in this file\'s folder) and open it via http://localhost:... instead.');
}
})();
</script>
</body>
</html>
